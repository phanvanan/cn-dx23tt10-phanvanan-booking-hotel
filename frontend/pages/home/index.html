<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt phòng khách sạn & Đánh giá | AnPV</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="../../styles/components.css">
    <link rel="stylesheet" href="../../styles/pages/home.css">
</head>
<body>
    
    
    <div id="navbar-component"></div>

    
    <section class="hero-section">
        <div class="container hero-content">
            <h1 class="hero-title">Khách sạn, Khu nghỉ dưỡng, Ký túc xá & Hơn thế nữa</h1>
            <p class="hero-subtitle">Nhận giá tốt nhất cho hơn 2.000.000 chỗ nghỉ toàn cầu</p>
            
            
            
            <div id="search-component" data-compact="false"></div>
            </div>
        </div>
    </section>

    
    <section class="container features-section">
        <div class="d-flex justify-between">
            <div class="feature-item d-flex align-center">
                <i class="fa-solid fa-tags feature-icon"></i>
                <div class="feature-text">
                    <strong>Giá luôn tốt</strong>
                    <span>Chúng tôi cam kết giá tốt nhất cho bạn</span>
                </div>
            </div>
            <div class="feature-item d-flex align-center">
                <i class="fa-solid fa-bed feature-icon"></i>
                <div class="feature-text">
                    <strong>Đa dạng lựa chọn</strong>
                    <span>Hàng triệu khách sạn và chỗ nghỉ toàn cầu</span>
                </div>
            </div>
            <div class="feature-item d-flex align-center">
                <i class="fa-solid fa-shield-halved feature-icon"></i>
                <div class="feature-text">
                    <strong>Thanh toán an toàn</strong>
                    <span>Đảm bảo an toàn và bảo mật thông tin</span>
                </div>
            </div>
        </div>
    </section>

    
    <main class="container">
        <section class="featured-hotels">
            <h2 class="section-title">Điểm đến thịnh hành</h2>
            <div class="location-tabs d-flex">
                <button class="loc-tab active" data-loc="all">Tất cả</button>
                <button class="loc-tab" data-loc="phuquoc">Phú Quốc</button>
                <button class="loc-tab" data-loc="nhatrang">Nha Trang</button>
                <button class="loc-tab" data-loc="dalat">Đà Lạt</button>
                <button class="loc-tab" data-loc="hanoi">Hà Nội</button>
            </div>
            
            <div class="hotel-grid" id="featured-hotel-list">
                
            </div>
        </section>
    </main>
    
    
    
    <div id="footer-component"></div>

    
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/vn.js"></script>
    
    <script src="../../scripts/core/utils.js"></script>
    <script src="../../scripts/core/api.js"></script>
    <script src="../../scripts/components/searchBar.js"></script>
    <script src="../../scripts/pages/home.js"></script>
    
    <script src="../../scripts/components/navbar.js"></script>
    <script src="../../scripts/components/footer.js"></script>
</body>
</html>
